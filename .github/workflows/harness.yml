name: harness

on:
  push:
    branches:
      - main
      - agent-harness-refactor
      - agent-cli-contract
      - agent-train-config
      - agent-data-io
      - agent-ci-tests
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy

      - name: Syntax check
        run: make check

      - name: Run tests
        run: make test
